# Keep ConfigDrive ahead of NoCloud for DigitalOcean custom images.
# This file must sort after DigitalOcean's generated 90-digitalocean.cfg so
# preserve_hostname is not overridden during first boot.
datasource_list: [ ConfigDrive, OpenNebula, DigitalOcean, Azure, AltCloud, OVF, MAAS, GCE, OpenStack, CloudSigma, SmartOS, None, NoCloud ]
# Keep the base image hostname instead of accepting an overlong droplet name.
preserve_hostname: true
